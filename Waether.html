<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Core | Global Weather Ensemble</title>
    <style>
        /* 깔끔한 다크 테마 디자인 */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --neon-blue: #00d4ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .weather-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }

        h2 { color: var(--accent-color); margin-bottom: 25px; font-weight: 300; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; transform: scale(1.05); }

        /* 날씨 표시 영역 */
        .temp-main {
            font-size: 5rem;
            font-weight: bold;
            margin: 10px 0;
            color: white;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .city-name { font-size: 1.5rem; color: var(--text-dim); }
        
        .status-msg {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--neon-blue);
        }

        .meta {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h2>STAR WEATHER</h2>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="도시명 입력 (English)">
            <button onclick="fetchWeather()">조회</button>
        </div>

        <div class="city-name" id="cityName">Waiting...</div>
        <div class="temp-main" id="tempDisplay">--°</div>
        
        <div class="status-msg" id="status">도시를 검색해 보세요.</div>
        <div class="meta" id="metaInfo">5대 글로벌 API 통합 엔진 가동 중</div>
    </div>

    <script>
        async function fetchWeather() {
            const city = document.getElementById('cityInput').value;
            const tempDisplay = document.getElementById('tempDisplay');
            const cityName = document.getElementById('cityName');
            const status = document.getElementById('status');
            const metaInfo = document.getElementById('metaInfo');

            if (!city) return alert("도시 이름을 입력해 주세요!");

            status.innerText = "데이터 분석 중...";
            
            try {
                // 서버의 /api/weather 경로로 요청을 보냄 (Env가 작동하는 곳)
                const res = await fetch(`/api/weather?city=${city}`);
                const data = await res.json();

                if (data.averageTemp) {
                    tempDisplay.innerText = `${data.averageTemp}°`;
                    cityName.innerText = data.city.toUpperCase();
                    status.innerText = "5개 API 평균값이 산출되었습니다.";
                    metaInfo.innerText = `분석 완료 (데이터 소스: ${data.sources}개)`;
                } else {
                    throw new Error();
                }
            } catch (err) {
                status.innerText = "에러: 데이터를 가져올 수 없습니다.";
                tempDisplay.innerText = "ERR";
            }
        }
    </script>
</body>
      </html>
